<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文寶物點擊遊戲</title>
  <style>
    :root {
      --sky: #87d9ff;
      --sun: #ffd95a;
      --grass: #55c96f;
      --leaf: #2fae60;
      --apple: #ff4f5f;
      --apple-dark: #d93649;
      --ink: #24425a;
      --cream: #fff7d6;
      --white: #ffffff;
      --shadow: rgba(36, 66, 90, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      font-family: "Trebuchet MS", "Comic Sans MS", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 14%, var(--sun) 0 58px, transparent 60px),
        linear-gradient(180deg, var(--sky) 0 68%, #b7ecff 68% 100%);
      display: grid;
      place-items: center;
      user-select: none;
    }

    .scene {
      position: relative;
      width: min(100vw, 900px);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .scene::before {
      content: "";
      position: absolute;
      left: -10vw;
      right: -10vw;
      bottom: 0;
      height: 30vh;
      background:
        radial-gradient(circle at 16% 35%, #ffe98a 0 12px, transparent 13px),
        radial-gradient(circle at 76% 42%, #ff9bc7 0 11px, transparent 12px),
        radial-gradient(circle at 45% 62%, #fff176 0 10px, transparent 11px),
        linear-gradient(180deg, var(--grass), #2fbf68);
      border-radius: 50% 50% 0 0 / 22% 22% 0 0;
      z-index: 0;
    }

    .game {
      position: relative;
      z-index: 1;
      width: min(92vw, 540px);
      display: grid;
      justify-items: center;
      gap: 14px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
      color: #1f6fb2;
      text-shadow: 0 4px 0 rgba(255, 255, 255, 0.75);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      width: fit-content;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--cream);
      box-shadow: 0 8px 20px var(--shadow);
      font-size: 1rem;
      font-weight: 800;
    }

    .target-card {
      width: min(100%, 420px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 16px;
      border: 4px solid #2d5674;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 8px 0 rgba(36, 66, 90, 0.14);
      font-weight: 1000;
    }

    .target-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff0a8;
      font-size: 1.9rem;
      flex: 0 0 auto;
    }

    .target-text {
      min-width: 0;
      font-size: clamp(1rem, 4vw, 1.25rem);
      overflow-wrap: anywhere;
    }

    .sound-btn {
      min-width: 128px;
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      color: #24425a;
      background: #fff7d6;
      box-shadow: 0 6px 0 rgba(36, 66, 90, 0.16);
      font: 1000 1rem "Trebuchet MS", system-ui, sans-serif;
      cursor: pointer;
    }

    .sound-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(36, 66, 90, 0.16);
    }

    .health-area {
      width: min(100%, 420px);
      display: grid;
      gap: 8px;
    }

    .health-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.05rem;
      font-weight: 900;
    }

    .health-shell {
      width: 100%;
      height: 30px;
      padding: 4px;
      border: 4px solid #2d5674;
      border-radius: 999px;
      background: var(--white);
      box-shadow: 0 9px 0 rgba(36, 66, 90, 0.12);
    }

    .health-fill {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4bd96d, #b8ef4c, #ffd75e);
      transition: width 180ms ease;
    }

    .monster-zone {
      position: relative;
      width: min(82vw, 320px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .monster {
      position: relative;
      width: 72%;
      aspect-ratio: 1;
      border: 0;
      border-radius: 46% 48% 52% 50%;
      background: radial-gradient(circle at 33% 25%, #ff8a94 0 18%, transparent 19%),
        linear-gradient(145deg, var(--apple), var(--apple-dark));
      color: white;
      cursor: pointer;
      box-shadow: 0 20px 0 #9e2735, 0 30px 28px var(--shadow);
      transform: translateY(0);
      transition: transform 120ms ease, filter 180ms ease, opacity 180ms ease;
      touch-action: manipulation;
    }

    .monster::before {
      content: "";
      position: absolute;
      top: -12%;
      left: 50%;
      width: 15%;
      height: 25%;
      border-radius: 999px;
      background: #7a4b2a;
      transform: rotate(13deg);
      transform-origin: bottom center;
    }

    .monster::after {
      content: "";
      position: absolute;
      top: -7%;
      left: 57%;
      width: 27%;
      height: 16%;
      border-radius: 100% 0 100% 0;
      background: var(--leaf);
      transform: rotate(-15deg);
    }

    .monster:active:not(:disabled),
    .monster.hit {
      transform: translateY(8px) scale(0.97);
      box-shadow: 0 12px 0 #9e2735, 0 22px 22px var(--shadow);
    }

    .monster:disabled {
      cursor: default;
      filter: saturate(0.8);
      opacity: 0.78;
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .face span {
      transform: translateY(8%);
      font-size: clamp(3.1rem, 12vw, 5rem);
      text-shadow: 0 4px 0 rgba(0, 0, 0, 0.13);
    }

    .pop-word {
      position: absolute;
      left: 50%;
      top: 45%;
      z-index: 3;
      color: #ffeb3b;
      font-size: clamp(2rem, 9vw, 4.5rem);
      font-weight: 1000;
      pointer-events: none;
      text-shadow:
        3px 3px 0 #2456a4,
        -3px 3px 0 #2456a4,
        3px -3px 0 #2456a4,
        -3px -3px 0 #2456a4,
        0 10px 18px rgba(36, 66, 90, 0.28);
      animation: popUp 1s ease-out forwards;
    }

    @keyframes popUp {
      0% {
        opacity: 0;
        transform: translate(-50%, 8px) scale(0.72) rotate(-7deg);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -18px) scale(1.05) rotate(4deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -92px) scale(1.18) rotate(-2deg);
      }
    }

    .message {
      min-height: 32px;
      font-size: 1.15rem;
      font-weight: 900;
      color: #1f6fb2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(36, 66, 90, 0.35);
      backdrop-filter: blur(4px);
    }

    .overlay.show {
      display: flex;
    }

    .dialog {
      width: min(92vw, 430px);
      padding: 26px;
      border: 5px solid #2d5674;
      border-radius: 24px;
      background: var(--cream);
      box-shadow: 0 18px 0 rgba(36, 66, 90, 0.2), 0 28px 40px rgba(36, 66, 90, 0.22);
      text-align: center;
    }

    .dialog h2 {
      margin: 0 0 12px;
      font-size: clamp(1.7rem, 7vw, 2.5rem);
      color: #ef5d72;
      letter-spacing: 0;
    }

    .dialog p {
      margin: 0 0 16px;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .answer-row {
      display: flex;
      gap: 10px;
    }

    input {
      min-width: 0;
      flex: 1;
      height: 52px;
      padding: 0 14px;
      border: 4px solid #58a6d6;
      border-radius: 16px;
      color: var(--ink);
      font: 900 1.3rem "Trebuchet MS", system-ui, sans-serif;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      background: white;
    }

    input:focus {
      border-color: #ffb84d;
      box-shadow: 0 0 0 5px rgba(255, 184, 77, 0.28);
    }

    .btn {
      min-width: 92px;
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      color: white;
      background: #2aa96b;
      box-shadow: 0 7px 0 #16774a;
      font: 1000 1.05rem "Trebuchet MS", system-ui, sans-serif;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #16774a;
    }

    .restart {
      background: #ff8f3d;
      box-shadow: 0 7px 0 #c76520;
    }

    .restart:active {
      box-shadow: 0 2px 0 #c76520;
    }

    .win-stars {
      margin: 0 0 12px;
      font-size: 3rem;
    }

    @media (max-width: 440px) {
      .scene {
        padding: 18px;
      }

      .game {
        gap: 12px;
      }

      .target-card {
        align-items: flex-start;
        text-align: left;
      }

      .answer-row {
        display: grid;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="scene">
    <section class="game" aria-label="英文寶物點擊遊戲">
      <h1>英文寶物打怪</h1>
      <p class="subtitle">點擊怪物，收集英文單字！</p>

      <div class="target-card" aria-live="polite">
        <span class="target-icon" id="targetIcon" aria-hidden="true">🍎</span>
        <div class="target-text" id="targetText">本次目標：APPLE (蘋果)</div>
      </div>

      <button class="sound-btn" id="soundButton" type="button">🔊 聽發音</button>

      <div class="health-area" aria-live="polite">
        <div class="health-label">
          <span>Monster HP</span>
          <span id="hpText">100 / 100</span>
        </div>
        <div class="health-shell" aria-hidden="true">
          <div class="health-fill" id="healthFill"></div>
        </div>
      </div>

      <div class="monster-zone" id="monsterZone">
        <button class="monster" id="monster" type="button" aria-label="點擊怪物">
          <span class="face"><span id="monsterIcon">🍎</span></span>
        </button>
      </div>

      <div class="message" id="message">Ready? Tap the monster!</div>
    </section>
  </main>

  <div class="overlay" id="quizOverlay" role="dialog" aria-modal="true" aria-labelledby="quizTitle">
    <form class="dialog" id="quizForm">
      <h2 id="quizTitle">拼字挑戰</h2>
      <p id="quizPrompt">請輸入這個中文的英文：蘋果</p>
      <div class="answer-row">
        <input id="answerInput" type="text" autocomplete="off" inputmode="latin" maxlength="20" aria-label="請輸入英文單字">
        <button class="btn" type="submit">送出</button>
      </div>
    </form>
  </div>

  <div class="overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="dialog">
      <div class="win-stars" aria-hidden="true">⭐ 🎁 ⭐</div>
      <h2 id="winTitle">You Win!</h2>
      <p id="winMessage">太棒了，你獲得新寶物了！</p>
      <button class="btn restart" id="restartButton" type="button">重新開始</button>
    </div>
  </div>

  <script>
    const MAX_HP = 100;
    const HIT_DAMAGE = 10;
    const HALF_HP = 50;
    const WRONG_HP = 70;

    const wordBank = [
      { word: "Apple", translation: "蘋果", imageUrl: "🍎" },
      { word: "Sword", translation: "劍", imageUrl: "⚔️" },
      { word: "Book", translation: "書", imageUrl: "📘" },
      { word: "Coin", translation: "金幣", imageUrl: "🪙" },
      { word: "Key", translation: "鑰匙", imageUrl: "🔑" }
    ];

    const monster = document.getElementById("monster");
    const monsterZone = document.getElementById("monsterZone");
    const monsterIcon = document.getElementById("monsterIcon");
    const targetIcon = document.getElementById("targetIcon");
    const targetText = document.getElementById("targetText");
    const soundButton = document.getElementById("soundButton");
    const healthFill = document.getElementById("healthFill");
    const hpText = document.getElementById("hpText");
    const message = document.getElementById("message");
    const quizOverlay = document.getElementById("quizOverlay");
    const quizForm = document.getElementById("quizForm");
    const quizPrompt = document.getElementById("quizPrompt");
    const answerInput = document.getElementById("answerInput");
    const winOverlay = document.getElementById("winOverlay");
    const winMessage = document.getElementById("winMessage");
    const restartButton = document.getElementById("restartButton");

    let hp = MAX_HP;
    let currentWord = null;
    let isPaused = false;
    let hasAskedHalfHp = false;
    let hasWon = false;

    function normalizeWord(word) {
      return word.trim().toUpperCase();
    }

    function getRandomWord() {
      const index = Math.floor(Math.random() * wordBank.length);
      return wordBank[index];
    }

    function getCurrentWordText() {
      return normalizeWord(currentWord.word);
    }

    function speakCurrentWord() {
      if (!("speechSynthesis" in window) || !currentWord) {
        message.textContent = "這個瀏覽器暫時不支援發音。";
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(currentWord.word);
      utterance.lang = "en-US";
      utterance.rate = 0.78;
      utterance.pitch = 1.1;
      window.speechSynthesis.speak(utterance);
    }

    function renderCurrentWord() {
      const wordText = getCurrentWordText();
      const image = currentWord.imageUrl || "🎁";

      targetIcon.textContent = image;
      monsterIcon.textContent = image;
      targetText.textContent = `本次目標：${wordText} (${currentWord.translation})`;
      quizPrompt.textContent = `請輸入這個中文的英文：${currentWord.translation}`;
      winMessage.textContent = `太棒了，你獲得 ${wordText} (${currentWord.translation}) 了！`;
    }

    function startNewRound() {
      currentWord = getRandomWord();
      hp = MAX_HP;
      isPaused = false;
      hasAskedHalfHp = false;
      hasWon = false;
      quizOverlay.classList.remove("show");
      winOverlay.classList.remove("show");
      message.textContent = "Ready? Tap the monster!";
      monster.disabled = false;
      renderCurrentWord();
      updateHealth();
    }

    function updateHealth() {
      healthFill.style.width = `${hp}%`;
      hpText.textContent = `${hp} / ${MAX_HP}`;
    }

    function setPaused(paused) {
      isPaused = paused;
      monster.disabled = paused || hasWon;
    }

    function showWordEffect() {
      const word = document.createElement("div");
      word.className = "pop-word";
      word.textContent = getCurrentWordText();
      monsterZone.appendChild(word);
      window.setTimeout(() => word.remove(), 1000);
    }

    function showQuiz() {
      setPaused(true);
      quizOverlay.classList.add("show");
      message.textContent = `看中文，拼出英文單字！`;
      answerInput.value = "";
      window.setTimeout(() => answerInput.focus(), 50);
    }

    function hideQuiz() {
      quizOverlay.classList.remove("show");
      setPaused(false);
    }

    function showWin() {
      hasWon = true;
      setPaused(true);
      speakCurrentWord();
      message.textContent = "You Win!";
      winOverlay.classList.add("show");
    }

    monster.addEventListener("click", () => {
      if (isPaused || hasWon) return;

      hp = Math.max(0, hp - HIT_DAMAGE);
      monster.classList.add("hit");
      window.setTimeout(() => monster.classList.remove("hit"), 140);
      showWordEffect();
      speakCurrentWord();
      updateHealth();

      if (hp === 0) {
        showWin();
        return;
      }

      if (hp === HALF_HP && !hasAskedHalfHp) {
        hasAskedHalfHp = true;
        showQuiz();
        return;
      }

      message.textContent = `Great! ${getCurrentWordText()}!`;
    });

    soundButton.addEventListener("click", speakCurrentWord);

    quizForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const answer = normalizeWord(answerInput.value);

      if (answer === getCurrentWordText()) {
        speakCurrentWord();
        message.textContent = "Correct! 繼續點擊！";
      } else {
        hp = WRONG_HP;
        updateHealth();
        message.textContent = "再試一次！HP 回到 70。";
      }

      hideQuiz();
    });

    restartButton.addEventListener("click", () => {
      startNewRound();
      speakCurrentWord();
    });

    startNewRound();
  </script>
</body>
</html>
