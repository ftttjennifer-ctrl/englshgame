<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文寶物點擊遊戲</title>
  <style>
    :root {
      --sky: #87d9ff;
      --sun: #ffd95a;
      --grass: #55c96f;
      --leaf: #2fae60;
      --apple: #ff4f5f;
      --apple-dark: #d93649;
      --ink: #24425a;
      --cream: #fff7d6;
      --white: #ffffff;
      --shadow: rgba(36, 66, 90, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      font-family: "Trebuchet MS", "Comic Sans MS", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 14%, var(--sun) 0 58px, transparent 60px),
        linear-gradient(180deg, var(--sky) 0 68%, #b7ecff 68% 100%);
      display: grid;
      place-items: center;
      user-select: none;
    }

    .scene {
      position: relative;
      width: min(100vw, 900px);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .scene::before {
      content: "";
      position: absolute;
      left: -10vw;
      right: -10vw;
      bottom: 0;
      height: 30vh;
      background:
        radial-gradient(circle at 16% 35%, #ffe98a 0 12px, transparent 13px),
        radial-gradient(circle at 76% 42%, #ff9bc7 0 11px, transparent 12px),
        radial-gradient(circle at 45% 62%, #fff176 0 10px, transparent 11px),
        linear-gradient(180deg, var(--grass), #2fbf68);
      border-radius: 50% 50% 0 0 / 22% 22% 0 0;
      z-index: 0;
    }

    .game {
      position: relative;
      z-index: 1;
      width: min(92vw, 540px);
      display: grid;
      justify-items: center;
      gap: 14px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
      color: #1f6fb2;
      text-shadow: 0 4px 0 rgba(255, 255, 255, 0.75);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      width: fit-content;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--cream);
      box-shadow: 0 8px 20px var(--shadow);
      font-size: 1rem;
      font-weight: 800;
    }

    .target-card {
      width: min(100%, 420px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 16px;
      border: 4px solid #2d5674;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 8px 0 rgba(36, 66, 90, 0.14);
      font-weight: 1000;
    }

    .target-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff0a8;
      font-size: 1.9rem;
      flex: 0 0 auto;
    }

    .target-text {
      min-width: 0;
      font-size: clamp(1rem, 4vw, 1.25rem);
      overflow-wrap: anywhere;
    }

    .sound-btn {
      min-width: 128px;
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      color: #24425a;
      background: #fff7d6;
      box-shadow: 0 6px 0 rgba(36, 66, 90, 0.16);
      font: 1000 1rem "Trebuchet MS", system-ui, sans-serif;
      cursor: pointer;
    }

    .sound-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(36, 66, 90, 0.16);
    }

    .health-area {
      width: min(100%, 420px);
      display: grid;
      gap: 8px;
    }

    .health-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.05rem;
      font-weight: 900;
    }

    .health-shell {
      width: 100%;
      height: 30px;
      padding: 4px;
      border: 4px solid #2d5674;
      border-radius: 999px;
      background: var(--white);
      box-shadow: 0 9px 0 rgba(36, 66, 90, 0.12);
    }

    .health-fill {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4bd96d, #b8ef4c, #ffd75e);
      transition: width 180ms ease;
    }

    .monster-zone {
      position: relative;
      width: min(82vw, 320px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .monster {
      position: relative;
      width: 72%;
      aspect-ratio: 1;
      border: 0;
      border-radius: 46% 48% 52% 50%;
      background: radial-gradient(circle at 33% 25%, #ff8a94 0 18%, transparent 19%),
        linear-gradient(145deg, var(--apple), var(--apple-dark));
      color: white;
      cursor: pointer;
      box-shadow: 0 20px 0 #9e2735, 0 30px 28px var(--shadow);
      transform: translateY(0);
      transition: transform 120ms ease, filter 180ms ease, opacity 180ms ease;
      touch-action: manipulation;
    }

    .monster::before {
      content: "";
      position: absolute;
      top: -12%;
      left: 50%;
      width: 15%;
      height: 25%;
      border-radius: 999px;
      background: #7a4b2a;
      transform: rotate(13deg);
      transform-origin: bottom center;
    }

    .monster::after {
      content: "";
      position: absolute;
      top: -7%;
      left: 57%;
      width: 27%;
      height: 16%;
      border-radius: 100% 0 100% 0;
      background: var(--leaf);
      transform: rotate(-15deg);
    }

    .monster:active:not(:disabled),
    .monster.hit {
      transform: translateY(8px) scale(0.97);
      box-shadow: 0 12px 0 #9e2735, 0 22px 22px var(--shadow);
    }

    .monster:disabled {
      cursor: default;
      filter: saturate(0.8);
      opacity: 0.78;
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .face span {
      transform: translateY(8%);
      font-size: clamp(3.1rem, 12vw, 5rem);
      text-shadow: 0 4px 0 rgba(0, 0, 0, 0.13);
    }

    .pop-word {
      position: absolute;
      left: 50%;
      top: 45%;
      z-index: 3;
      max-width: 92vw;
      color: #ffeb3b;
      font-size: clamp(1.5rem, 7vw, 4.5rem);
      font-weight: 1000;
      line-height: 1.05;
      overflow-wrap: anywhere;
      pointer-events: none;
      text-shadow:
        3px 3px 0 #2456a4,
        -3px 3px 0 #2456a4,
        3px -3px 0 #2456a4,
        -3px -3px 0 #2456a4,
        0 10px 18px rgba(36, 66, 90, 0.28);
      animation: popUp 1s ease-out forwards;
    }

    @keyframes popUp {
      0% {
        opacity: 0;
        transform: translate(-50%, 8px) scale(0.72) rotate(-7deg);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -18px) scale(1.05) rotate(4deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -92px) scale(1.18) rotate(-2deg);
      }
    }

    .message {
      min-height: 32px;
      font-size: 1.15rem;
      font-weight: 900;
      color: #1f6fb2;
    }

    .coin-counter {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      padding: 8px 14px;
      border: 4px solid #8a5a16;
      border-radius: 999px;
      background: #fff4a8;
      box-shadow: 0 7px 0 rgba(138, 90, 22, 0.28), 0 10px 22px var(--shadow);
      color: #6a4210;
      font-size: 1.2rem;
      font-weight: 1000;
    }

    .shop {
      width: min(100%, 470px);
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 4px solid #2d5674;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 0 rgba(36, 66, 90, 0.14);
      text-align: left;
    }

    .shop-title {
      margin: 0;
      color: #1f6fb2;
      font-size: 1.15rem;
      font-weight: 1000;
      text-align: center;
    }

    .shop-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .shop-name {
      margin: 0 0 4px;
      font-size: 1rem;
      font-weight: 1000;
    }

    .shop-desc {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 800;
      color: #49677c;
    }

    .buy-btn {
      min-width: 112px;
      min-height: 44px;
      border: 0;
      border-radius: 14px;
      color: white;
      background: #ff8f3d;
      box-shadow: 0 6px 0 #c76520;
      font: 1000 0.95rem "Trebuchet MS", system-ui, sans-serif;
      cursor: pointer;
    }

    .buy-btn:disabled {
      color: #6f7f88;
      background: #d5dde1;
      box-shadow: 0 6px 0 #a6b2b8;
      cursor: not-allowed;
    }

    .upgrade-pop {
      position: fixed;
      left: 50%;
      bottom: 28%;
      z-index: 20;
      color: #fff04d;
      font-size: clamp(1.5rem, 6vw, 3.2rem);
      font-weight: 1000;
      pointer-events: none;
      text-align: center;
      text-shadow:
        3px 3px 0 #1f6fb2,
        -3px 3px 0 #1f6fb2,
        3px -3px 0 #1f6fb2,
        -3px -3px 0 #1f6fb2,
        0 10px 20px rgba(36, 66, 90, 0.3);
      animation: upgradePop 1.2s ease-out forwards;
    }

    @keyframes upgradePop {
      0% {
        opacity: 0;
        transform: translate(-50%, 20px) scale(0.7);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -6px) scale(1.06);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -70px) scale(1.14);
      }
    }

    .hidden {
      display: none !important;
    }

    .world-screen {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #0b5fa5;
    }

    .world-map {
      position: relative;
      width: min(100vw, 1280px);
      aspect-ratio: 1536 / 1024;
      overflow: hidden;
      border: 6px solid rgba(255, 255, 255, 0.72);
      border-radius: 22px;
      background: url("assets/world-map.png") center / cover no-repeat;
      box-shadow: 0 24px 60px rgba(11, 45, 86, 0.45);
    }

    .map-hud {
      position: absolute;
      left: 18px;
      top: 16px;
      z-index: 4;
      max-width: min(430px, calc(100% - 36px));
      padding: 12px 14px;
      border: 3px solid rgba(255, 255, 255, 0.78);
      border-radius: 16px;
      background: rgba(12, 42, 92, 0.72);
      color: white;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.35);
    }

    .map-hud h2 {
      margin: 0 0 4px;
      font-size: clamp(1.25rem, 2.4vw, 2rem);
      letter-spacing: 0;
    }

    .map-hud p {
      margin: 0;
      font-size: clamp(0.85rem, 1.6vw, 1rem);
      font-weight: 800;
    }

    .map-node {
      position: absolute;
      z-index: 3;
      display: grid;
      place-items: center;
      width: clamp(46px, 5.2vw, 74px);
      aspect-ratio: 1;
      border: 4px solid rgba(255, 255, 255, 0.86);
      border-radius: 50%;
      background: rgba(255, 232, 84, 0.88);
      color: #193d5f;
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      cursor: pointer;
      box-shadow: 0 0 0 0 rgba(255, 240, 80, 0.85), 0 8px 18px rgba(0, 0, 0, 0.28);
      transform: translate(-50%, -50%);
      transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
    }

    .map-node:hover:not(:disabled),
    .map-node:focus-visible:not(:disabled) {
      filter: brightness(1.16);
      transform: translate(-50%, -50%) scale(1.12);
      box-shadow: 0 0 0 12px rgba(255, 240, 80, 0.28), 0 12px 24px rgba(0, 0, 0, 0.32);
      outline: none;
    }

    .map-node:disabled {
      cursor: not-allowed;
      filter: grayscale(0.9) brightness(0.72);
      opacity: 0.72;
    }

    .map-node.completed {
      background: rgba(92, 222, 118, 0.9);
    }

    .map-node.boss {
      width: clamp(42px, 4.4vw, 64px);
      background: rgba(83, 51, 32, 0.92);
      color: #ffe365;
    }

    .map-label {
      position: absolute;
      z-index: 3;
      min-width: 118px;
      padding: 6px 10px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 999px;
      background: rgba(10, 37, 74, 0.72);
      color: white;
      font-size: clamp(0.72rem, 1.3vw, 0.92rem);
      font-weight: 1000;
      text-align: center;
      transform: translate(-50%, 18px);
      pointer-events: none;
      text-shadow: 0 2px 3px rgba(0, 0, 0, 0.4);
    }

    .player-marker {
      position: absolute;
      z-index: 5;
      display: grid;
      place-items: center;
      width: clamp(34px, 3.8vw, 54px);
      aspect-ratio: 1;
      border: 3px solid white;
      border-radius: 50%;
      background: #2f9dff;
      color: white;
      font-size: clamp(1.1rem, 2.4vw, 1.8rem);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
      transform: translate(-50%, -112%);
      transition: left 520ms ease, top 520ms ease;
      pointer-events: none;
    }

    .map-toast {
      position: absolute;
      left: 50%;
      bottom: 18px;
      z-index: 6;
      max-width: min(92%, 620px);
      padding: 10px 14px;
      border: 3px solid rgba(255, 255, 255, 0.8);
      border-radius: 999px;
      background: rgba(255, 247, 214, 0.95);
      color: #24425a;
      font-size: clamp(0.86rem, 1.6vw, 1.05rem);
      font-weight: 1000;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.22);
      transform: translateX(-50%);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(36, 66, 90, 0.35);
      backdrop-filter: blur(4px);
    }

    .overlay.show {
      display: flex;
    }

    .dialog {
      width: min(92vw, 430px);
      padding: 26px;
      border: 5px solid #2d5674;
      border-radius: 24px;
      background: var(--cream);
      box-shadow: 0 18px 0 rgba(36, 66, 90, 0.2), 0 28px 40px rgba(36, 66, 90, 0.22);
      text-align: center;
    }

    .dialog h2 {
      margin: 0 0 12px;
      font-size: clamp(1.7rem, 7vw, 2.5rem);
      color: #ef5d72;
      letter-spacing: 0;
    }

    .dialog p {
      margin: 0 0 16px;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .answer-row {
      display: flex;
      gap: 10px;
    }

    input {
      min-width: 0;
      flex: 1;
      height: 52px;
      padding: 0 14px;
      border: 4px solid #58a6d6;
      border-radius: 16px;
      color: var(--ink);
      font: 900 1.3rem "Trebuchet MS", system-ui, sans-serif;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      background: white;
    }

    input:focus {
      border-color: #ffb84d;
      box-shadow: 0 0 0 5px rgba(255, 184, 77, 0.28);
    }

    .btn {
      min-width: 92px;
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      color: white;
      background: #2aa96b;
      box-shadow: 0 7px 0 #16774a;
      font: 1000 1.05rem "Trebuchet MS", system-ui, sans-serif;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #16774a;
    }

    .restart {
      background: #ff8f3d;
      box-shadow: 0 7px 0 #c76520;
    }

    .restart:active {
      box-shadow: 0 2px 0 #c76520;
    }

    .win-stars {
      margin: 0 0 12px;
      font-size: 3rem;
    }

    @media (max-width: 440px) {
      .scene {
        padding: 18px;
      }

      .game {
        gap: 12px;
      }

      .target-card {
        align-items: flex-start;
        text-align: left;
      }

      .answer-row {
        display: grid;
      }

      .btn {
        width: 100%;
      }

      .coin-counter {
        top: 10px;
        right: 10px;
        min-height: 40px;
        padding: 6px 10px;
        font-size: 1rem;
      }

      .shop-item {
        grid-template-columns: 1fr;
      }

      .buy-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="coin-counter" aria-live="polite">
    <span aria-hidden="true">🪙</span>
    <span id="coinText">0</span>
  </div>

  <section class="world-screen" id="worldScreen" aria-label="世界大地圖">
    <div class="world-map" id="worldMap">
      <div class="map-hud">
        <h2>英文冒險世界</h2>
        <p id="mapStatus">從果凍食物森林出發，完成區域與橋樑 Boss 後解鎖下一區。</p>
      </div>

      <button class="map-node" id="nodeFood" type="button" data-map-node="food" style="left: 78%; top: 79%;" aria-label="進入 Food 果凍食物森林">🍔</button>
      <div class="map-label" style="left: 78%; top: 79%;">Food</div>

      <button class="map-node boss" id="nodeBossFood" type="button" data-map-node="bossFood" style="left: 50%; top: 72%;" aria-label="進入 Food Boss 名詞複數">💀</button>
      <div class="map-label" style="left: 50%; top: 72%;">Boss 1</div>

      <button class="map-node" id="nodeAnimals" type="button" data-map-node="animals" style="left: 66%; top: 58%;" aria-label="進入 Animals 奇幻動物草原">🐾</button>
      <div class="map-label" style="left: 66%; top: 58%;">Animals</div>

      <button class="map-node boss" id="nodeBossAnimals" type="button" data-map-node="bossAnimals" style="left: 32%; top: 52%;" aria-label="進入 Animals Boss 動詞填空">💀</button>
      <div class="map-label" style="left: 32%; top: 52%;">Boss 2</div>

      <button class="map-node" id="nodePlants" type="button" data-map-node="plants" style="left: 83%; top: 31%;" aria-label="進入 Plants 巨木植物園">🌿</button>
      <div class="map-label" style="left: 83%; top: 31%;">Plants</div>

      <button class="map-node boss" id="nodeBossPlants" type="button" data-map-node="bossPlants" style="left: 50%; top: 30%;" aria-label="進入 Plants Boss 介系詞填空">💀</button>
      <div class="map-label" style="left: 50%; top: 30%;">Boss 3</div>

      <button class="map-node" id="nodeVehicles" type="button" data-map-node="vehicles" style="left: 15%; top: 31%;" aria-label="進入 Vehicles 科技交通島">🚄</button>
      <div class="map-label" style="left: 15%; top: 31%;">Vehicles</div>

      <button class="map-node boss" id="nodeBossVehicles" type="button" data-map-node="bossVehicles" style="left: 49%; top: 15%;" aria-label="進入 Vehicles Boss 最終橋樑">💀</button>
      <div class="map-label" style="left: 49%; top: 15%;">Boss 4</div>

      <button class="map-node" id="nodeClothing" type="button" data-map-node="clothing" style="left: 23%; top: 9%;" aria-label="進入 Clothing 魔法服裝城">👕</button>
      <div class="map-label" style="left: 23%; top: 9%;">Clothing</div>

      <div class="player-marker" id="playerMarker" style="left: 50%; top: 93%;" aria-hidden="true">🧒</div>
      <div class="map-toast" id="mapToast">點擊已解鎖的區域開始挑戰。</div>
    </div>
  </section>

  <main class="scene hidden" id="gameScreen">
    <section class="game" aria-label="英文寶物點擊遊戲">
      <h1>英文寶物打怪</h1>
      <p class="subtitle">點擊怪物，收集英文單字！</p>

      <div class="target-card" aria-live="polite">
        <span class="target-icon" id="targetIcon" aria-hidden="true">🍎</span>
        <div class="target-text" id="targetText">中文提示：蘋果</div>
      </div>

      <button class="sound-btn" id="soundButton" type="button">🔊 聽發音</button>

      <div class="health-area" aria-live="polite">
        <div class="health-label">
          <span>Monster HP</span>
          <span id="hpText">100 / 100</span>
        </div>
        <div class="health-shell" aria-hidden="true">
          <div class="health-fill" id="healthFill"></div>
        </div>
      </div>

      <div class="monster-zone" id="monsterZone">
        <button class="monster" id="monster" type="button" aria-label="點擊怪物">
          <span class="face"><span id="monsterIcon">🍎</span></span>
        </button>
      </div>

      <div class="message" id="message">Ready? Tap the monster!</div>

      <section class="shop" aria-label="升級商店">
        <h2 class="shop-title">升級商店</h2>
        <div class="shop-item">
          <div>
            <p class="shop-name">🧤 強化手套</p>
            <p class="shop-desc" id="attackText">攻擊力：10 → 20｜價格：150 金幣</p>
          </div>
          <button class="buy-btn" id="buyGloveButton" type="button" disabled>購買 150</button>
        </div>
      </section>
    </section>
  </main>

  <div class="overlay" id="quizOverlay" role="dialog" aria-modal="true" aria-labelledby="quizTitle">
    <form class="dialog" id="quizForm">
      <h2 id="quizTitle">拼字挑戰</h2>
      <p id="quizPrompt">請輸入這個中文的英文：蘋果</p>
      <div class="answer-row">
        <input id="answerInput" type="text" autocomplete="off" inputmode="latin" maxlength="120" aria-label="請輸入英文單字或句子">
        <button class="btn" type="submit">送出</button>
      </div>
    </form>
  </div>

  <div class="overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="dialog">
      <div class="win-stars" aria-hidden="true">⭐ 🎁 ⭐</div>
      <h2 id="winTitle">You Win!</h2>
      <p id="winMessage">太棒了，你獲得新寶物了！</p>
      <button class="btn restart" id="restartButton" type="button">回到地圖</button>
    </div>
  </div>

  <script>
    const MAX_HP = 100;
    const BASE_DAMAGE = 10;
    const UPGRADED_DAMAGE = 20;
    const KILL_REWARD = 50;
    const GLOVE_COST = 150;
    const HALF_HP = 50;
    const WRONG_HP = 70;

    const wordBank = [

      { word: "The ball is in front of the school.", translation: "球在學校前面。", imageUrl: "🏫" },

      { word: "It's sunny.", translation: "晴天。", imageUrl: "☀️" },

      { word: "Where is the library?", translation: "圖書館在哪裡？", imageUrl: "🏛️" },
      { word: "It's next to the bookstore.", translation: "它在書店旁邊。", imageUrl: "📚" },
      { word: "Where is the park?", translation: "公園在哪裡？", imageUrl: "🌳" },
      { word: "It's behind the school.", translation: "它在學校後面。", imageUrl: "🏫" },
      { word: "The movie theater is across from the hospital.", translation: "電影院在醫院對面。", imageUrl: "🎬" },
      { word: "The firehouse is in front of the supermarket.", translation: "消防隊在超市前面。", imageUrl: "🚒" },
      { word: "It's cloudy.", translation: "多雲。", imageUrl: "☁️" },
      { word: "Is it hot in the winter?", translation: "冬天炎熱嗎？", imageUrl: "🔥" },
      { word: "dog", translation: "狗", imageUrl: "🐶" },
      { word: "cat", translation: "貓", imageUrl: "🐱" },
      { word: "bird", translation: "鳥", imageUrl: "🐦" },
      { word: "rabbit", translation: "兔子", imageUrl: "🐰" },
      { word: "lion", translation: "獅子", imageUrl: "🦁" },
      { word: "dogs", translation: "狗們", imageUrl: "🐶" },
      { word: "cats", translation: "貓們", imageUrl: "🐱" },
      { word: "birds", translation: "鳥們", imageUrl: "🐦" },
      { word: "rabbits", translation: "兔子們", imageUrl: "🐰" },
      { word: "tree", translation: "樹", imageUrl: "🌳" },
      { word: "flower", translation: "花", imageUrl: "🌸" },
      { word: "grass", translation: "草", imageUrl: "🌱" },
      { word: "leaf", translation: "葉子", imageUrl: "🍃" },
      { word: "mushroom", translation: "蘑菇", imageUrl: "🍄" },
      { word: "car", translation: "汽車", imageUrl: "🚗" },
      { word: "bus", translation: "公車", imageUrl: "🚌" },
      { word: "train", translation: "火車", imageUrl: "🚆" },
      { word: "airplane", translation: "飛機", imageUrl: "✈️" },
      { word: "bicycle", translation: "腳踏車", imageUrl: "🚲" },
      { word: "shirt", translation: "襯衫", imageUrl: "👕" },
      { word: "shoes", translation: "鞋子", imageUrl: "👟" },
      { word: "hat", translation: "帽子", imageUrl: "🎩" },
      { word: "pants", translation: "褲子", imageUrl: "👖" },
      { word: "gloves", translation: "手套", imageUrl: "🧤" }
    ];

    const mapChallenges = {
      food: {
        label: "果凍食物森林 Food",
        type: "area",
        x: 78,
        y: 79,
        words: ["Apple", "cafeteria", "supermarket", "Coin", "Book"]
      },
      bossFood: {
        label: "Boss：名詞複數橋",
        type: "boss",
        requires: "food",
        unlocks: "animals",
        x: 50,
        y: 72,
        words: ["dogs", "cats", "birds", "rabbits", "gloves"]
      },
      animals: {
        label: "奇幻動物草原 Animals",
        type: "area",
        requires: "bossFood",
        x: 66,
        y: 58,
        words: ["dog", "cat", "bird", "rabbit", "lion"]
      },
      bossAnimals: {
        label: "Boss：位置介系詞橋",
        type: "boss",
        requires: "animals",
        unlocks: "plants",
        x: 32,
        y: 52,
        words: ["behind", "next to", "across from", "in front of"]
      },
      plants: {
        label: "巨木植物園 Plants",
        type: "area",
        requires: "bossAnimals",
        x: 83,
        y: 31,
        words: ["tree", "flower", "grass", "leaf", "mushroom", "park", "lake"]
      },
      bossPlants: {
        label: "Boss：地點問答橋",
        type: "boss",
        requires: "plants",
        unlocks: "vehicles",
        x: 50,
        y: 30,
        words: ["Where is the lake?", "It's next to the pool.", "Where is the boathouse?", "It's next to the lake."]
      },
      vehicles: {
        label: "科技交通島 Vehicles",
        type: "area",
        requires: "bossPlants",
        x: 15,
        y: 31,
        words: ["car", "bus", "train", "airplane", "bicycle"]
      },
      bossVehicles: {
        label: "Boss：天氣句型橋",
        type: "boss",
        requires: "vehicles",
        unlocks: "clothing",
        x: 49,
        y: 15,
        words: ["What's the weather like?", "It's warm.", "It's sunny.", "It's rainy.", "Is it snowy in the winter?", "Yes, it is.", "No, it isn't."]
      },
      clothing: {
        label: "魔法服裝城 Clothing / Equipment",
        type: "area",
        requires: "bossVehicles",
        x: 23,
        y: 9,
        words: ["shirt", "shoes", "hat", "pants", "gloves", "Sword", "Key"]
      }
    };

    const monster = document.getElementById("monster");
    const monsterZone = document.getElementById("monsterZone");
    const monsterIcon = document.getElementById("monsterIcon");
    const targetIcon = document.getElementById("targetIcon");
    const targetText = document.getElementById("targetText");
    const soundButton = document.getElementById("soundButton");
    const worldScreen = document.getElementById("worldScreen");
    const gameScreen = document.getElementById("gameScreen");
    const playerMarker = document.getElementById("playerMarker");
    const mapStatus = document.getElementById("mapStatus");
    const mapToast = document.getElementById("mapToast");
    const mapNodeButtons = document.querySelectorAll("[data-map-node]");
    const healthFill = document.getElementById("healthFill");
    const hpText = document.getElementById("hpText");
    const coinText = document.getElementById("coinText");
    const attackText = document.getElementById("attackText");
    const buyGloveButton = document.getElementById("buyGloveButton");
    const message = document.getElementById("message");
    const quizOverlay = document.getElementById("quizOverlay");
    const quizForm = document.getElementById("quizForm");
    const quizPrompt = document.getElementById("quizPrompt");
    const answerInput = document.getElementById("answerInput");
    const winOverlay = document.getElementById("winOverlay");
    const winMessage = document.getElementById("winMessage");
    const restartButton = document.getElementById("restartButton");

    let hp = MAX_HP;
    let currentWord = null;
    let isPaused = false;
    let hasAskedHalfHp = false;
    let hasWon = false;
    let coins = 0;
    let attackDamage = BASE_DAMAGE;
    let hasGlove = false;
    let rewardGiven = false;
    let currentChallengeId = null;
    let lastMapNodeId = "food";
    const completedChallenges = new Set();

    function normalizeWord(word) {
      return word
        .trim()
        .replace(/[’‘]/g, "'")
        .replace(/[?.!。？！]+$/g, "")
        .replace(/\s+/g, " ")
        .toUpperCase();
    }

    function getRandomWord() {
      const pool = getCurrentChallengePool();
      const index = Math.floor(Math.random() * pool.length);
      return pool[index];
    }

    function getCurrentChallengePool() {
      const challenge = mapChallenges[currentChallengeId];
      if (!challenge) return wordBank;

      const pool = challenge.words
        .map((targetWord) => wordBank.find((item) => normalizeWord(item.word) === normalizeWord(targetWord)))
        .filter(Boolean);

      return pool.length > 0 ? pool : wordBank;
    }

    function getCurrentWordText() {
      return normalizeWord(currentWord.word);
    }

    function speakCurrentWord() {
      if (!("speechSynthesis" in window) || !currentWord) {
        message.textContent = "這個瀏覽器暫時不支援發音。";
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(currentWord.word);
      utterance.lang = "en-US";
      utterance.rate = 0.78;
      utterance.pitch = 1.1;
      window.speechSynthesis.speak(utterance);
    }

    function renderCurrentWord() {
      const wordText = getCurrentWordText();
      const image = currentWord.imageUrl || "🎁";

      targetIcon.textContent = image;
      monsterIcon.textContent = image;
      targetText.textContent = `中文提示：${currentWord.translation}`;
      quizPrompt.textContent = `請輸入這個中文的英文：${currentWord.translation}`;
      winMessage.textContent = `太棒了，你獲得 ${wordText} (${currentWord.translation}) 了！`;
    }

    function startNewRound() {
      currentWord = getRandomWord();
      hp = MAX_HP;
      isPaused = false;
      hasAskedHalfHp = false;
      hasWon = false;
      rewardGiven = false;
      quizOverlay.classList.remove("show");
      winOverlay.classList.remove("show");
      message.textContent = "Ready? Tap the monster!";
      monster.disabled = false;
      renderCurrentWord();
      updateHealth();
      updateShop();
    }

    function isChallengeUnlocked(id) {
      const challenge = mapChallenges[id];
      return !challenge.requires || completedChallenges.has(challenge.requires);
    }

    function updateMap() {
      mapNodeButtons.forEach((button) => {
        const id = button.dataset.mapNode;
        const unlocked = isChallengeUnlocked(id);
        button.disabled = !unlocked;
        button.classList.toggle("completed", completedChallenges.has(id));
        button.title = unlocked ? mapChallenges[id].label : "先完成前一區域與 Boss 挑戰";
      });

      const currentNode = mapChallenges[lastMapNodeId] || mapChallenges.food;
      playerMarker.style.left = `${currentNode.x}%`;
      playerMarker.style.top = `${currentNode.y}%`;

      const unlockedAreas = Object.entries(mapChallenges)
        .filter(([id, challenge]) => challenge.type === "area" && isChallengeUnlocked(id) && !completedChallenges.has(id))
        .map(([, challenge]) => challenge.label);

      mapStatus.textContent = unlockedAreas.length
        ? `目前可挑戰：${unlockedAreas.join("、")}`
        : "所有主要區域都已完成，太棒了！";
    }

    function enterChallenge(id) {
      if (!isChallengeUnlocked(id)) {
        mapToast.textContent = "這裡還鎖著：請先完成前一區域與橋樑 Boss。";
        return;
      }

      currentChallengeId = id;
      lastMapNodeId = id;
      const challenge = mapChallenges[id];
      mapToast.textContent = `前往 ${challenge.label}！`;
      updateMap();

      window.setTimeout(() => {
        worldScreen.classList.add("hidden");
        gameScreen.classList.remove("hidden");
        startNewRound();
      }, 420);
    }

    function completeChallenge() {
      if (!currentChallengeId) return;

      completedChallenges.add(currentChallengeId);
      const challenge = mapChallenges[currentChallengeId];
      const unlocked = challenge.unlocks ? mapChallenges[challenge.unlocks].label : "";
      mapToast.textContent = unlocked
        ? `完成 ${challenge.label}！下一區 ${unlocked} 已解鎖。`
        : `完成 ${challenge.label}！回到地圖選擇下一個挑戰。`;
      updateMap();
    }

    function returnToMap() {
      winOverlay.classList.remove("show");
      quizOverlay.classList.remove("show");
      gameScreen.classList.add("hidden");
      worldScreen.classList.remove("hidden");
      currentChallengeId = null;
      updateMap();
    }

    function updateHealth() {
      healthFill.style.width = `${hp}%`;
      hpText.textContent = `${hp} / ${MAX_HP}`;
    }

    function updateShop() {
      coinText.textContent = coins;
      attackText.textContent = hasGlove
        ? `攻擊力：${attackDamage}｜已擁有強化手套`
        : `攻擊力：${attackDamage} → ${UPGRADED_DAMAGE}｜價格：${GLOVE_COST} 金幣`;
      buyGloveButton.disabled = hasGlove || coins < GLOVE_COST;
      buyGloveButton.textContent = hasGlove ? "已購買" : `購買 ${GLOVE_COST}`;
    }

    function showUpgradeText(text) {
      const pop = document.createElement("div");
      pop.className = "upgrade-pop";
      pop.textContent = text;
      document.body.appendChild(pop);
      window.setTimeout(() => pop.remove(), 1200);
    }

    function addCoins(amount) {
      coins += amount;
      updateShop();
      showUpgradeText(`+${amount} 金幣！`);
    }

    function setPaused(paused) {
      isPaused = paused;
      monster.disabled = paused || hasWon;
    }

    function showWordEffect() {
      const word = document.createElement("div");
      word.className = "pop-word";
      word.textContent = getCurrentWordText();
      monsterZone.appendChild(word);
      window.setTimeout(() => word.remove(), 1000);
    }

    function showQuiz() {
      setPaused(true);
      quizOverlay.classList.add("show");
      message.textContent = `看中文，拼出英文單字！`;
      answerInput.value = "";
      window.setTimeout(() => answerInput.focus(), 50);
    }

    function hideQuiz() {
      quizOverlay.classList.remove("show");
      setPaused(false);
    }

    function showWin() {
      hasWon = true;
      setPaused(true);
      if (!rewardGiven) {
        rewardGiven = true;
        addCoins(KILL_REWARD);
        completeChallenge();
      }
      speakCurrentWord();
      message.textContent = "You Win!";
      winOverlay.classList.add("show");
    }

    monster.addEventListener("click", () => {
      if (isPaused || hasWon) return;

      hp = Math.max(0, hp - attackDamage);
      monster.classList.add("hit");
      window.setTimeout(() => monster.classList.remove("hit"), 140);
      showWordEffect();
      speakCurrentWord();
      updateHealth();

      if (hp === 0) {
        showWin();
        return;
      }

      if (hp === HALF_HP && !hasAskedHalfHp) {
        hasAskedHalfHp = true;
        showQuiz();
        return;
      }

      message.textContent = `Great! ${getCurrentWordText()}!`;
    });

    soundButton.addEventListener("click", speakCurrentWord);

    buyGloveButton.addEventListener("click", () => {
      if (hasGlove || coins < GLOVE_COST) return;

      coins -= GLOVE_COST;
      hasGlove = true;
      attackDamage = UPGRADED_DAMAGE;
      updateShop();
      showUpgradeText("強化手套升級！攻擊力 20！");
    });

    quizForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const answer = normalizeWord(answerInput.value);

      if (answer === getCurrentWordText()) {
        speakCurrentWord();
        message.textContent = "Correct! 繼續點擊！";
      } else {
        hp = WRONG_HP;
        updateHealth();
        message.textContent = "再試一次！HP 回到 70。";
      }

      hideQuiz();
    });

    restartButton.addEventListener("click", () => {
      returnToMap();
    });

    mapNodeButtons.forEach((button) => {
      button.addEventListener("click", () => enterChallenge(button.dataset.mapNode));
    });

    updateShop();
    updateMap();
  </script>
